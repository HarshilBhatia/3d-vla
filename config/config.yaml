# Single source of truth for train, offline eval, online eval, and analyse_qk.
# Override from CLI: python main.py batch_size=32 eval_only=true
# Switch dataset type: python main.py dataset=peract  (peract2 | peract | peract2_singlecam | peract_twocam)
# Switch data config: python main.py data=two  (single | two | full)  <- which tasks/split
# Switch rope mode: python main.py rope_mode=com  (none | standard | com)
# Switch experiment: python main.py experiment=comrope_2task  (default | comrope_2task | one_task | full | drope)


# === Data / loader (train & offline eval) ===
# data group sets train_data_dir, eval_data_dir, train_instructions, val_instructions (see config/data/*.yaml)
train_data_dir: ''
eval_data_dir: ''
train_instructions: ''
val_instructions: ''
dataset: Peract2_3dfront_3dwrist

# DataLoader: num_workers >= (1+prefetch) per GPU; increase if GPU waits on data. memory_limit = zarr LRU cache (GB).
num_workers: 4
prefetch_factor: 4  # batches to prefetch per worker; try 8 if RAM allows
batch_size: 64
batch_size_val: 64
chunk_size: 1
memory_limit: 8.0

# === Logging ===
base_log_dir: train_logs
exp_log_dir: exp
run_log_dir: run

# === Benchmarking ===
benchmark: false              # enable per-rank timing/memory logging to benchmark_rank*.txt
benchmark_warmup_steps: 0     # steps to discard before recording (GPU/CUDA warmup)
benchmark_log_freq: 50        # flush interval in steps
benchmark_dummy_data: false   # skip zarr/NFS entirely; use random in-memory tensors

# === Wandb ===
use_wandb: true
wandb_project: 3d_flowmatch_actor
wandb_run_name: null
wandb_run_id: null
wandb_save_checkpoints: false
wandb_watch_model: false

# === Train / offline eval ===
# checkpoint: path to .pth for resume or eval_only; null = train from scratch
checkpoint: null
val_freq: 4000
last_ckpt_freq: 2000
interm_ckpt_freq: 10000
# eval_only: true = run validation only (no training); trainer uses run_mode=eval_offline
eval_only: false
lr: 0.0001
backbone_lr: 0.0001
lr_scheduler: constant
wd: 0.005
train_iters: 40000  # total training steps; override per experiment or CLI
use_compile: false  # torch.compile on compute_loss (faster, sometimes unstable)
use_ema: false      # exponential moving average of weights for eval
lv2_batch_size: 1

# === Model: policy type ===
model_type: denoise3d
# bimanual: true for Peract2 bimanual tasks (bimanual_lift_tray, etc.); false for single-arm
bimanual: false
keypose_only: true
pre_tokenize: true
custom_img_size: null
workspace_normalizer_buffer: 0.04

# === Model: encoder ===
# backbone: clip | siglip2 | dino
#   clip    — CLIP RN50 vision + CLIP text (openai/clip-vit-base-patch32)
#   siglip2 — SigLIP2 ViT vision + SigLIP2 text (google/siglip2-base-patch16-256)
#             NOTE: siglip2 requires re-tokenizing the dataset (different vocabulary/max_length)
#   dino    — DINOv2 ViT-B/14 vision (facebook/dinov2-base); text_backbone selects text encoder
#
# text_backbone: null | clip | siglip2
#   null    — defaults to same as backbone (backward compatible)
#   clip    — CLIP text encoder; use with dino backbone (pre_tokenize must be true)
#   siglip2 — SigLIP2 text encoder
backbone: clip
text_backbone: null
finetune_backbone: false
finetune_text_encoder: false
fps_subsampling_factor: 5



# === Online eval (evaluate_policy.py) ===
task: null
max_tries: 10
max_steps: 25
headless: false
collision_checking: false
seed: 0
data_dir: demos
image_size: "256,256"
output_file: eval.json
fp16: false
prediction_len: 1

# === RoPE analysis (analyse_qk.py) ===
rope_analysis_max_batches: 50
rope_analysis_save_name: rope3d_frequency_norms.pt




# === Model: head ===
embedding_dim: 120
num_attn_heads: 8
num_vis_instr_attn_layers: 3
num_history: 3
num_shared_attn_layers: 4
relative_action: false
rotation_format: quat_xyzw
denoise_timesteps: 5
denoise_model: rectified_flow


sa_blocks_use_rope: true
traj_scene_rope: true


learn_extrinsics: false
predict_extrinsics: false
extrinsics_prediction_mode: delta_m  # 'rt' = R,T (6D); 'delta_m' = 6x6 matrix
dynamic_rope_from_camtoken: true  # re-predict delta_M/(R,T) from cam-token after each SA/CA block
# use_front_camera_frame: canonical name; use for front-camera frame transform in data/eval
use_front_camera_frame: false
pc_rotate_by_front_camera: false
# miscalibration_noise_level: null = no noise; "small" / "medium" / "large" = constant per-camera extrinsics noise
miscalibration_noise_level: null
# random miscalibration: sample fresh noise per batch. set both to enable (overridden by miscalibration_noise_level).
# miscal_max_angle_deg: max rotation noise per axis in degrees (e.g. 5.0)
# miscal_max_translation_m: max translation noise per axis in metres (e.g. 0.01)
miscal_max_angle_deg: null
miscal_max_translation_m: null
# Orbital camera eval settings (used when dataset=OrbitalWrist)
cameras_file: null                    # path to orbital_cameras_grouped.json
task_group_mapping_file: null         # path to task_group_mapping.json (eval uses all trained groups)
camera_groups: null                   # override which groups to eval, e.g. "G1" or "G1,G2"; null = use all from mapping
fov_deg: 60.0                         # FOV in degrees for orbital VisionSensors

# RoPE: traj_scene_rope, sa_blocks_use_rope come from config/rope_mode/<name>.yaml



rope_type: normal
rope_schedule_type: null
rope_schedule_start_k: null
rope_schedule_end_k: null
rope_schedule_steps: null



# @_global_ merges group content into root (so train_data_dir, train_instructions, etc. are top-level)
# _self_ sets composition order so this config's values come first, then group configs override.
defaults:
  - _self_
  - data@_global_: single
  - experiment@_global_: default